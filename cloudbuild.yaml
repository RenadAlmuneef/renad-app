steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Get first VM from Auto Scaling group
        VM_NAME=$(gcloud compute instance-groups list-instances renad-mig --zone=me-central1-a --format="value(instance)" | head -1)
        echo "Deploying to VM: $VM_NAME"
        # Copy files to Filestore via that VM
        gcloud compute scp --recurse ./* "$VM_NAME":/mnt/shared/ --zone=me-central1-a

options:
  logging: CLOUD_LOGGING_ONLY
